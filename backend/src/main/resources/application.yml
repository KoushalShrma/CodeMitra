spring:
  application:
    name: codemitra-backend
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:codemitra;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
  
  # H2 Console (for development)
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  
  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Clerk Configuration
clerk:
  jwks-url: ${CLERK_JWKS_URL:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}
  issuer: ${CLERK_ISSUER:https://your-clerk-instance.clerk.accounts.dev}

# Piston API Configuration
piston:
  api-url: ${PISTON_API_URL:https://emkc.org/api/v2/piston}
  timeout-seconds: ${PISTON_TIMEOUT:30}
  max-code-length: ${PISTON_MAX_CODE_LENGTH:50000}

# Groq API Configuration
groq:
  api-key: ${GROQ_API_KEY:}
  api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
  model: ${GROQ_MODEL:llama3-8b-8192}
  max-tokens: ${GROQ_MAX_TOKENS:500}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging:
  level:
    com.codemitra: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
