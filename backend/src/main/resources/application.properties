# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:codemitra}
spring.datasource.username=${DB_USER:codemitra}
spring.datasource.password=${DB_PASSWORD:codemitra}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Clerk
clerk.secret-key=${CLERK_SECRET_KEY:disabled}
clerk.jwks-url=${CLERK_JWKS_URL:https://example.com/.well-known/jwks.json}

# JWT
admin.jwt.secret=${ADMIN_JWT_SECRET:dev_admin_secret_change_me_1234567890}
admin.jwt.expiry.hours=8
admin.jwt.expiration-minutes=${ADMIN_JWT_EXPIRATION_MINUTES:480}
institution.jwt.secret=${INSTITUTION_JWT_SECRET:dev_institution_secret_change_me_1234567890}
institution.jwt.expiry.hours=12
institution.jwt.expiration-minutes=${INSTITUTION_JWT_EXPIRATION_MINUTES:720}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:admin123}

# Groq
groq.api.key=${GROQ_API_KEY:disabled}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama3-8b-8192}
groq.daily.budget.usd=${GROQ_DAILY_BUDGET_USD:5.00}
groq.model.hint=${GROQ_MODEL_HINT:llama3-8b-8192}
groq.model.review=${GROQ_MODEL_REVIEW:llama3-70b-8192}
groq.model.summary=${GROQ_MODEL_SUMMARY:llama3-8b-8192}
groq.model.chat=${GROQ_MODEL_CHAT:llama3-8b-8192}

# Judge0
judge0.rapidapi.key=${JUDGE0_RAPIDAPI_KEY:}
judge0.rapidapi.host=${JUDGE0_RAPIDAPI_HOST:judge0-ce.p.rapidapi.com}
judge0.fallback.endpoint=${JUDGE0_FALLBACK_ENDPOINT:https://ce.judge0.com}

# Email
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from.address=${SMTP_FROM_ADDRESS:no-reply@codemitra.local}
spring.mail.test-connection=false
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${SMTP_FROM_ADDRESS:no-reply@codemitra.local}
app.institution.login-url=${INSTITUTION_LOGIN_URL:http://localhost:5000/institution/login}

# Redis
spring.redis.url=${REDIS_URL:disabled}

# Server
server.port=5000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Scraper
scraper.enabled=${SCRAPER_ENABLED:true}
scraper.weekly.cron=${SCRAPER_WEEKLY_CRON:0 0 3 * * SUN}
scraper.max-problems-per-source=${SCRAPER_MAX_ITEMS_PER_SOURCE:200}
scraper.request.delay.ms=${SCRAPER_REQUEST_DELAY_MS:600}
scraper.request.retries=${SCRAPER_REQUEST_RETRIES:2}
