# Spring Boot runtime port stays configurable for local/dev environments.
server.port=${SERVER_PORT:5000}

# MySQL datasource settings read from environment variables.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:codemitra}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# Schema is managed through Flyway migrations.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway migration settings.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT validation settings for Clerk token verification.
clerk.secret-key=${CLERK_SECRET_KEY}
clerk.jwks-url=${CLERK_JWKS_URL}

# Separate JWT settings for backend-managed super admin auth.
admin.jwt.secret=${ADMIN_JWT_SECRET:}
admin.jwt.expiration-minutes=${ADMIN_JWT_EXPIRATION_MINUTES:720}

# Separate JWT settings for backend-managed institution auth.
institution.jwt.secret=${INSTITUTION_JWT_SECRET:}
institution.jwt.expiration-minutes=${INSTITUTION_JWT_EXPIRATION_MINUTES:720}

# Optional bootstrap admin password (only used when provided).
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}

# Optional SMTP email settings for institution credential dispatch.
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${SMTP_FROM_ADDRESS}
app.institution.login-url=${INSTITUTION_LOGIN_URL:http://localhost:5173/institution/login}
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Judge0 settings support both RapidAPI mode and fallback public endpoint mode.
judge0.rapidapi.key=${JUDGE0_RAPIDAPI_KEY}
judge0.rapidapi.host=${JUDGE0_RAPIDAPI_HOST:judge0-ce.p.rapidapi.com}
judge0.fallback.endpoint=${JUDGE0_FALLBACK_ENDPOINT:https://ce.judge0.com}

# Groq AI settings for backend proxy calls.
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.model.hint=${GROQ_MODEL_HINT:llama3-8b-8192}
groq.model.review=${GROQ_MODEL_REVIEW:llama3-70b-8192}
groq.model.summary=${GROQ_MODEL_SUMMARY:llama3-8b-8192}
groq.model.chat=${GROQ_MODEL_CHAT:llama3-8b-8192}
groq.daily.budget.usd=${GROQ_DAILY_BUDGET_USD:5.00}

# Redis connection URL for Spring Data internals. Keep this a valid redis:// URL.
# App-level Redis usage toggle remains controlled by REDIS_URL in GroqCacheGateway.
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}

# Scraper scheduling and network behavior defaults.
scraper.enabled=${SCRAPER_ENABLED:true}
scraper.weekly.cron=${SCRAPER_WEEKLY_CRON:0 0 2 * * MON}
scraper.max-problems-per-source=${SCRAPER_MAX_PROBLEMS_PER_SOURCE:80}
scraper.request.delay.ms=${SCRAPER_REQUEST_DELAY_MS:600}
scraper.request.retries=${SCRAPER_REQUEST_RETRIES:2}

# Analytics buffering window for stale -> recomputed transitions.
analytics.recalculate.batch-ms=${ANALYTICS_RECALCULATE_BATCH_MS:30000}
